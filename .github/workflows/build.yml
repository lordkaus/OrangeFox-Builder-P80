name: PBRP - Build Cubot P80 (Android 12.1)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build PBRP by ${{ github.actor }}
    runs-on: ubuntu-20.04
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Clean-up Environment
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /var/lib/mysql /usr/local/lib/android /opt/ghc
        sudo apt update
        sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3 python3-pip

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize and Sync PBRP
      run: |
        mkdir ~/PBRP
        cd ~/PBRP
        git config --global user.name "lordkaus"
        git config --global user.email "lmatostmelo@gmail.com"
        repo init -u https://github.com/PitchBlackRecoveryProject/manifest_pb.git -b android-12.1 --depth=1
        repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd ~/PBRP
        git clone https://github.com/lordkaus/android_device_cubot_p80 -b main device/cubot/p80

    - name: Run Compilation
      run: |
        cd ~/PBRP
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_p80-eng || lunch twrp_p80-userdebug
        make clean
        mka pbrp -j$(nproc --all)

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PBRP-Cubot-P80-IMG
        path: ~/PBRP/out/target/product/p80/*.img
